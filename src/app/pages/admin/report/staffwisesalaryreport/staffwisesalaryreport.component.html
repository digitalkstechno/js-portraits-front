<div class="salary-report-window">
  <!-- Individual Employee Report -->
  <section class="section">
    <div class="section-header">
      <h3>Individual Employee Salary</h3>
      <span class="hint">Select employee to view monthly payouts</span>
    </div>

    <!-- employee filter -->
    <div class="employee-select">
      <label>Select Employee</label>
      <select
        [ngModel]="selectedStaffId"
        (ngModelChange)="onSelectEmployee($event)"
      >
        <option *ngFor="let e of employeeTotals" [value]="e.staffId">
          {{ e.staffName }}
        </option>
      </select>
    </div>

    <div class="grid">
      <!-- History table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th class="text-right">Amount (₹)</th>
              <th>Type</th>
              <th>Payment Mode</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let h of employeeHistory">
              <td>{{ h.date }}</td>
              <td class="text-right">
                {{ h.amount | number: "1.2-2" }}
              </td>
              <td>{{ h.type }}</td>
              <td>{{ h.paymentMode }}</td>
              <td>{{ h.remarks }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Line chart -->
      <div class="chart-card">
        <h4>{{ selectedStaffName }} - Salary Trend</h4>
        <div class="chart-container">
          <canvas #employeeLineChart></canvas>
        </div>
      </div>
    </div>
  </section>
</div>
