<!-- staff-salary-report.component.html -->
<div class="salary-report-window">
  <h2>Staff Salary Reports</h2>

  <!-- Overall Employee Wise Summary -->
  <section class="section">
    <div class="section-header">
      <h3>Overall Employee-wise Salary</h3>
      <span class="hint">Total salary paid per employee</span>
    </div>

    <div class="grid">
      <!-- Summary table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th class="text-right">Total Paid (₹)</th>
              <th>Last Paid On</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of employeeTotals">
              <td>{{ row.staffName }}</td>
              <td class="text-right">
                {{ row.totalPaid | number: "1.2-2" }}
              </td>
              <td>{{ row.lastPaidOn | date: "dd/MM/yyyy" }}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Bar chart -->
      <div class="chart-card">
        <h4>Salary Paid by Employee</h4>
        <div class="chart-container">
          <canvas #overallBarChart></canvas>
        </div>
      </div>
    </div>
  </section>
</div>
