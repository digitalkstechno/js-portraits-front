<div class="window-container" [formGroup]="termsForm">
  <div class="title-bar d-flex justify-content-between align-items-center">
    <div class="flex-grow-1 text-center fw-bold">
      Terms & Conditions Settings
    </div>
    <button class="btn-close-custom" (click)="onExit()">×</button>
  </div>

  <div class="window-body p-3">
    <div formArrayName="conditions">
      <div
        *ngFor="let item of conditions.controls; let i = index"
        [formGroupName]="i"
        class="terms-block mb-3 p-2 border border-primary-subtle"
      >
        <div class="d-flex justify-content-between mb-2">
          <span class="badge bg-primary">Condition #{{ i + 1 }}</span>
          <button
            class="btn btn-sm btn-danger py-0"
            (click)="removeCondition(i)"
          >
            Remove
          </button>
        </div>

        <div class="row mb-2 align-items-center">
          <label class="col-sm-3 fw-bold small">Heading :</label>
          <div class="col-sm-9">
            <input
              type="text"
              formControlName="header"
              class="form-control form-control-sm border-dark"
              placeholder="e.g. Payment Terms"
            />
          </div>
        </div>

        <div class="row align-items-start">
          <label class="col-sm-3 fw-bold small">Content :</label>
          <div class="col-sm-9">
            <textarea
              formControlName="body"
              class="form-control custom-textarea"
              placeholder="Enter details here..."
            ></textarea>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-between mt-3 border-top pt-3">
      <button class="btn-action" (click)="addCondition()">
        + Add New Term
      </button>
      <div class="d-flex gap-2">
        <button class="btn-action" (click)="onSubmit()">Save Settings</button>
        <button class="btn-action" (click)="onExit()">Exit</button>
      </div>
    </div>
  </div>
</div>
<div *ngIf="showPopup" class="toast-overlay" [class.error-toast]="isError">
  <div class="toast-content">
    <span class="icon">{{ isError ? "⚠️" : "✅" }}</span>
    <span class="message">{{ popupMessage }}</span>
  </div>
</div>
