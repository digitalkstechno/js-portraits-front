<div class="window">
  <div class="title-bar">
    <span>Staff Master / Employee Registration</span>
    <button class="close-btn" (click)="close()">✖</button>
  </div>

  <div class="form-container">
    <form [formGroup]="staffForm">
      <div class="main-fields">
        <div class="field-group">
          <div class="field-item">
            <label>Staff ID</label>
            <input
              type="text"
              style="width: 80px"
              placeholder="Auto"
              formControlName="staffId"
              readonly
            />
          </div>
          <div class="field-item" style="flex: 2">
            <label>Full Name</label>
            <input
              type="text"
              style="width: 100%"
              placeholder="Enter staff name"
              formControlName="name"
            />
          </div>
          <div class="field-item">
            <label>Joining Date</label>
            <input
              type="date"
              style="width: 130px"
              formControlName="joining_date"
            />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item">
            <label>Contact No</label>
            <input
              type="text"
              style="width: 150px"
              placeholder="10-digit mobile"
              formControlName="contact_no"
            />
          </div>
          <div class="field-item">
            <label>Salary (Monthly)</label>
            <input
              type="number"
              style="width: 120px; text-align: right"
              placeholder="0.00"
              formControlName="salary"
            />
          </div>
          <div class="field-item">
            <label>Role</label>
            <input
              type="text"
              placeholder="Search role..."
              (input)="filterRoles($event)"
              formControlName="role"
            />

            <div class="dropdown-list" *ngIf="filteredRoles.length">
              <div
                class="dropdown-item"
                *ngFor="let r of filteredRoles"
                (click)="selectRole(r)"
              >
                {{ r }}
              </div>
            </div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-item">
            <label>Age</label>
            <input
              type="number"
              style="width: 150px"
              placeholder="Enter age"
              formControlName="age"
            />
          </div>
          <div class="field-item">
            <label>Gender</label>
            <select style="width: 130px" formControlName="gender">
              <option value="">Select gender</option>
              <option value="male">Male</option>
              <option value="feale">Female</option>
            </select>
          </div>
          <div class="field-item">
            <label>Address</label>
            <input
              type="text"
              style="width: 100%"
              placeholder="Complete residential address"
              formControlName="address"
            />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item" style="flex: 1">
            <label>Remarks</label>
            <input
              type="text"
              style="width: 100%"
              placeholder="ID Proof details, etc."
              formControlName="remarks"
            />
          </div>
        </div>
      </div>
    </form>

    <div class="totals-sidebar">
      <div class="total-row">
        <label>Total Staff:</label>
        <span class="info-value">{{ totalStaff }}</span>
      </div>
      <div class="total-row">
        <label>Active:</label>
        <span class="info-value" style="color: green">{{ totalStaff }}</span>
      </div>
      <div class="total-row">
        <label>On Leave:</label>
        <span class="info-value" style="color: orange">0</span>
      </div>
    </div>
  </div>

  <div class="item-entry-strip">
    <div class="entry-col" style="flex: 1">
      <label>Search Staff List</label>
      <input
        type="text"
        placeholder="Search by name or phone..."
        style="width: 100%"
        [value]="searchText"
        (input)="onSearchChange($any($event.target).value)"
      />
    </div>
    <div class="entry-col">
      <label>&nbsp;</label>
      <button class="btn" style="min-width: 100px" (click)="clearSearch()">
        Clear
      </button>
    </div>
  </div>

  <div class="table-section">
    <table>
      <thead>
        <tr>
          <th width="50">ID</th>
          <th>Name</th>
          <th>Phone Number</th>
          <th>Role</th>
          <th>Salary</th>
          <th>Joining Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of staff">
          <td>{{ s.staffId }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.contact_no }}</td>
          <td>{{ s.role }}</td>
          <td>{{ s.salary }}</td>
          <td>{{ s.joining_date | date }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="action-bar">
    <button type="submit" class="btn btn-save" (click)="onSubmit()">
      Save
    </button>
    <button class="btn" (click)="updateStaff()">Update</button>
    <button class="btn" (click)="clearForm()">Clear</button>
    <button class="btn btn-exit" (click)="deleteStaff()">Delete</button>
    <button class="btn btn-exit" (click)="close()">Exit</button>
  </div>
</div>
