<div class="window">
  <div class="title-bar">
    <span>Staff Master / Employee Registration</span>
    <button class="close-btn">✖</button>
  </div>

  <div class="form-container">
    <div class="main-fields">
      <div class="field-group">
        <div class="field-item">
          <label>Staff ID</label>
          <input type="text" style="width: 80px" placeholder="Auto" readonly />
        </div>
        <div class="field-item" style="flex: 2">
          <label>Full Name</label>
          <input
            type="text"
            style="width: 100%"
            placeholder="Enter staff name"
          />
        </div>
        <div class="field-item">
          <label>Joining Date</label>
          <input type="date" style="width: 130px" />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item">
          <label>Phone No</label>
          <input
            type="text"
            style="width: 150px"
            placeholder="10-digit mobile"
          />
        </div>
        <div class="field-item">
          <label>Salary (Monthly)</label>
          <input
            type="number"
            style="width: 120px; text-align: right"
            placeholder="0.00"
          />
        </div>
        <div class="field-item">
          <label>Role</label>
          <select style="width: 150px">
            <option>Photographer</option>
            <option>Editor</option>
            <option>Assistant</option>
            <option>Manager</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Address</label>
          <input
            type="text"
            style="width: 100%"
            placeholder="Complete residential address"
          />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Remarks</label>
          <input
            type="text"
            style="width: 100%"
            placeholder="ID Proof details, etc."
          />
        </div>
      </div>
    </div>

    <div class="totals-sidebar">
      <div class="total-row">
        <label>Total Staff:</label>
        <span class="info-value">12</span>
      </div>
      <div class="total-row">
        <label>Active:</label>
        <span class="info-value" style="color: green">10</span>
      </div>
      <div class="total-row">
        <label>On Leave:</label>
        <span class="info-value" style="color: orange">02</span>
      </div>
    </div>
  </div>

  <div class="item-entry-strip">
    <div class="entry-col" style="flex: 1">
      <label>Search Staff List</label>
      <input
        type="text"
        placeholder="Search by name or phone..."
        style="width: 100%"
      />
    </div>
    <div class="entry-col">
      <label>&nbsp;</label>
      <button class="btn" style="min-width: 100px">Search</button>
    </div>
  </div>

  <div class="table-section">
    <table>
      <thead>
        <tr>
          <th width="50">ID</th>
          <th>Name</th>
          <th>Phone Number</th>
          <th>Role</th>
          <th>Salary</th>
          <th>Joining Date</th>
          <th width="100">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>S-001</td>
          <td>John Doe</td>
          <td>9876543210</td>
          <td>Senior Editor</td>
          <td>25,000</td>
          <td>01/01/2024</td>
          <td><span class="status-badge">Active</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="action-bar">
    <button class="btn btn-save">Save Staff</button>
    <button class="btn">Update</button>
    <button class="btn">Clear</button>
    <button class="btn">Print List</button>
    <button class="btn btn-exit">Delete</button>
    <button class="btn btn-exit" (click)="close()">Exit</button>
  </div>
</div>
