<div class="window">
  <!-- Header -->
  <div class="title-bar">
    <span>Staff Salary & Expense Management</span>
    <button class="close-btn" (click)="onExit()">✖</button>
  </div>

  <!-- Top form + summary -->
  <div class="form-container">
    <form [formGroup]="salaryForm">
      <!-- Staff Search -->
      <div class="field-item">
        <label>Staff</label>
        <input
          type="text"
          placeholder="Search staff..."
          formControlName="staffName"
          (input)="onStaffSearch($any($event.target).value)"
          autocomplete="off"
        />

        <div class="dropdown-list" *ngIf="showDropdown">
          <div
            class="dropdown-item"
            *ngFor="let staff of filteredStaff"
            (click)="selectStaff(staff)"
          >
            {{ staff.name }} - {{ staff.designation }}
          </div>
        </div>
      </div>

      <!-- Date -->
      <div class="field-item">
        <label>Date</label>
        <input type="date" formControlName="date" />
      </div>

      <!-- Type -->
      <div class="field-item">
        <label>Type</label>
        <select formControlName="type">
          <option value="Salary">Salary</option>
          <option value="Exposure">Exposure</option>
        </select>
      </div>

      <!-- Amount -->
      <div class="field-item">
        <label>Amount</label>
        <input type="number" formControlName="amount" />
      </div>

      <!-- Payment Mode -->
      <div class="field-item">
        <label>Payment</label>
        <select formControlName="payMode">
          <option>Cash</option>
          <option>UPI</option>
          <option>Bank Transfer</option>
          <option>Cheque</option>
        </select>
      </div>

      <!-- Remarks -->
      <div class="field-item" style="flex: 1 1 100%;">
        <label>Remarks</label>
        <input type="text" formControlName="remarks" style="width: 100%;" />
      </div>
    </form>

    <!-- Right summary card -->
    <div class="totals-sidebar">
      <div class="total-row">
        <label>Monthly Salary:</label>
        <span class="info-value">₹25,000</span>
      </div>
      <div class="total-row">
        <label>Paid Till Now:</label>
        <span class="info-value" style="color:#2f855a;">₹15,000</span>
      </div>
      <div class="total-row" style="border-top:1px dashed #cc8f8f; padding-top:6px;">
        <label>Pending:</label>
        <span class="info-value" style="color:#c53030;">₹10,000</span>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <table>
      <thead>
        <tr>
          <th width="100">Date</th>
          <th>Staff Name</th>
          <th width="120">Type</th>
          <th width="120">Amount (₹)</th>
          <th>Remarks</th>
          <th width="100">Mode</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="text-center">05/11/2023</td>
          <td>John Doe</td>
          <td><span class="type-badge exposure">Exposure</span></td>
          <td class="text-right">500.00</td>
          <td>Travel Allowance - Surat Trip</td>
          <td class="text-center">UPI</td>
        </tr>
        <tr>
          <td class="text-center">01/11/2023</td>
          <td>John Doe</td>
          <td><span class="type-badge salary">Salary</span></td>
          <td class="text-right">15,000.00</td>
          <td>Part salary for Oct</td>
          <td class="text-center">Cash</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Bottom buttons -->
  <div class="action-bar">
    <button class="btn btn-save" (click)="onSubmit()">Save</button>
    <button class="btn">Print Slip</button>
    <button class="btn btn-exit" (click)="resetForm()">Clear</button>
    <button class="btn btn-exit" (click)="onExit()">Exit</button>
  </div>
</div>
