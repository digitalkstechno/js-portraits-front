<div class="window">
  <div class="title-bar">
    <span>Outdoor Order Book</span>
    <button class="close-btn">✖</button>
  </div>

  <div class="form-container">
    <div class="main-fields">
      <div class="field-group">
        <div class="field-item">
          <label>Order No</label>
          <input type="text" style="width: 80px" readonly />
        </div>
        <div class="field-item">
          <label>Date</label>
          <input type="text" style="width: 110px" placeholder="DD/MM/YYYY" />
        </div>
        <div class="field-item">
          <label>Mob No</label>
          <input type="text" style="width: 135px" />
        </div>
        <div class="field-item">
          <label>Quotation No</label>
          <input type="text" style="width: 100px" />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Cust Name</label>
          <input type="text" style="width: 100%" />
        </div>
        <div class="field-item" style="flex: 1">
          <label>Couple</label>
          <input type="text" style="width: 100%" />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Address</label>
          <input type="text" style="width: 100%" />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Remark</label>
          <input type="text" style="width: 100%" />
        </div>
        <div class="field-item" style="flex: 1">
          <label>Notes</label>
          <input type="text" style="width: 100%" />
        </div>
      </div>

      <div class="field-group">
        <div class="field-item" style="flex: 1">
          <label>Package</label>
          <input type="text" style="width: 100%" />
        </div>
      </div>
    </div>

    <div class="totals-sidebar">
        <span>Order Details</span>
      <table>
        <thead>
          <tr>
            <th>Ord. No</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>03/03/2026</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="item-entry-strip">
    <div class="entry-col">
      <label>Date</label>
      <input type="text" style="width: 90px" />
    </div>
    <div class="entry-col" style="flex: 2">
      <label>Item Name</label>
      <input type="text" style="width: 100%" />
    </div>
    <div class="entry-col" style="flex: 2">
      <label>Product</label>
      <input type="text" style="width: 100%" />
    </div>
    <div class="entry-col" style="flex: 2">
      <label>Event Name</label>
      <input type="text" style="width: 100%" />
    </div>
    <div class="entry-col">
      <label>Qty</label>
      <input type="text" style="width: 50px" />
    </div>
    <div class="entry-col">
      <label>Rate</label>
      <input type="text" style="width: 80px" />
    </div>
    <div class="entry-col">
      <label>Total</label>
      <input type="text" style="width: 100px" />
    </div>
    <div class="entry-col">
      <label>Place</label>
      <input type="text" style="width: 100px" />
    </div>
    <div class="entry-col">
      <label>Time</label>
      <input type="text" style="width: 80px" />
    </div>
    <div class="entry-col">
      <label>&nbsp;</label>
      <button class="btn-add">+</button>
    </div>
  </div>

  <div class="table-section">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Item Name</th>
          <th>Product</th>
          <th>Event</th>
          <th>Qty</th>
          <th>Rate</th>
          <th>Total</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>cwc</td>
          <td>cwc</td>
          <td>cwec</td>
          <td>cwec</td>
          <td>cwec</td>
          <td>cwec</td>
          <td>cwec</td>
          <td>cwec</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="footer-summary">
    <div class="summary-box">
      <div class="summary-row">
        <label>Subtotal</label>
        <input type="text" />
      </div>
      <div class="summary-row">
        <label>Discount</label>
        <input type="text" />
      </div>
      <div class="summary-row">
        <label>Advance</label>
        <input type="text" />
      </div>
      <div class="summary-row">
        <label>Grand Total</label>
        <input type="text" />
      </div>
      <div class="summary-row grand-total-highlight">
        <label>Payment</label>
        <select name="" id="">
          <option value=""></option>
        </select>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-save">Book Order</button>
    <button class="btn">Update</button>
    <button class="btn">View Calendar</button>
    <button class="btn btn-social">SMS Alert</button>
    <button class="btn">Print Agreement</button>
    <button class="btn btn-exit">Exit</button>
  </div>
</div>
