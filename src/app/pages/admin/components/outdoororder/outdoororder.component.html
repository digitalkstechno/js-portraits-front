<form [formGroup]="orderForm">
  <div class="window">
    <div class="title-bar">
      <span>Outdoor Order Book</span>
      <button class="close-btn" (click)="close()">✖</button>
    </div>

    <div class="form-container">
      <div class="main-fields">
        <div class="field-group">
          <div class="field-item">
            <label>Order No</label>
            <input
              type="text"
              style="width: 80px"
              formControlName="orderNo"
              readonly
            />
          </div>
          <div class="field-item">
            <label>Date</label>
            <input
              type="date"
              style="width: 110px"
              placeholder="DD/MM/YYYY"
              formControlName="date"
            />
          </div>
          <div class="field-item">
            <label>Mob No</label>
            <input
              type="text"
              style="width: 135px"
              formControlName="contactNo"
            />
          </div>
          <div class="field-item">
            <label>Quotation No</label>
            <input
              type="text"
              style="width: 100px"
              formControlName="quotationNo"
              (keydown.enter)="$event.preventDefault(); searchQuotation()"
              placeholder="Press Enter"
            />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item" style="flex: 1">
            <label>Outdoor Party</label>
            <input
              type="text"
              style="width: 100%"
              placeholder="Search Outdoor party"
              (input)="filterParty($event)"
              formControlName="outdoorParty"
            />
            <div class="dropdown-list" *ngIf="filteredCustomers.length">
              <div
                class="dropdown-item"
                *ngFor="let r of filteredCustomers"
                (click)="selectParty(r)"
              >
                {{ r.name }}
              </div>
            </div>
          </div>
          <div class="field-item" style="flex: 1">
            <label>Couple</label>
            <input type="text" style="width: 100%" formControlName="couple" />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item" style="flex: 1">
            <label>Address</label>
            <input type="text" style="width: 100%" formControlName="address" />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item" style="flex: 1">
            <label>Remark</label>
            <input type="text" style="width: 100%" formControlName="remarks" />
          </div>
          <div class="field-item" style="flex: 1">
            <label>Notes</label>
            <input type="text" style="width: 100%" formControlName="notes" />
          </div>
        </div>

        <div class="field-group">
          <div class="field-item" style="flex: 1">
            <label>Package</label>
            <input type="text" style="width: 100%" formControlName="package" />
          </div>
        </div>
      </div>

      <div class="totals-sidebar">
        <span>Order Details</span>
        <table>
          <thead>
            <tr>
              <th>Ord. No</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>{{ orderForm.value.orderNo }}</td>
              <td>{{ orderForm.value.date | date: "dd/MM/yyyy" }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-section">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Item Name</th>
            <th>Product</th>
            <th>Event</th>
            <th>Qty</th>
            <th>Rate</th>
            <th>Total</th>
            <!-- <th>Action</th> -->
          </tr>
        </thead>

        <tbody formArrayName="items">
          <tr
            *ngFor="let item of items.controls; let i = index"
            [formGroupName]="i"
          >
            <td style="width: 120px">
              <input type="text" formControlName="date" placeholder="---" />
            </td>

            <td>
              <input type="text" formControlName="itemName" readonly />
            </td>

            <td>
              <input type="text" formControlName="productName" readonly />

              <input type="hidden" formControlName="productId" />
            </td>
            <td>
              <input type="text" formControlName="eventName" />
            </td>

            <td style="width: 60px">
              <input
                type="number"
                formControlName="qty"
                style="text-align: center"
              />
            </td>

            <td style="width: 90px">
              <input
                type="number"
                formControlName="rate"
                style="text-align: center"
              />
            </td>

            <td style="width: 100px; font-weight: bold">
              <input
                type="number"
                formControlName="total"
                readonly
                style="text-align: center"
              />
            </td>

            <!-- <td style="width: 40px">
              <button type="button" class="btn-remove" (click)="removeItem(i)">
                ✖
              </button>
            </td> -->
          </tr>
        </tbody>
      </table>
    </div>

    <!-- FOOTER -->
    <div class="footer-summary">
      <div class="summary-box">
        <div class="summary-row">
          <label>Subtotal</label>
          <input type="text" formControlName="subTotal" />
        </div>

        <div class="summary-row">
          <label>Discount</label>
          <input type="text" formControlName="discount" />
        </div>

        <div class="summary-row">
          <label>Advance</label>
          <input type="text" formControlName="advance" />
        </div>

        <div class="summary-row">
          <label>Grand Total</label>
          <input type="text" formControlName="grandTotal" />
        </div>

        <div class="summary-row grand-total-highlight">
          <label>Payment</label>
          <select>
            <option value=""></option>
          </select>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button type="button" class="btn btn-save" (click)="onSubmit()">
        Save
      </button>
      <button class="btn btn-exit">Delete</button>
      <button class="btn">Print with Rate</button>
      <button class="btn">Print without Rate</button>
      <button class="btn" (click)="clear()">Cancel</button>
      <button type="button" class="btn btn-exit" (click)="close()">Exit</button>
      <button class="btn btn-social">Send SMS</button>
      <button class="btn btn-social">Send WhatsApp</button>
      <button class="btn btn-social">Send Email</button>
    </div>
  </div>
</form>

<div *ngIf="showPopup" class="toast-overlay" [class.error-toast]="isError">
  <div class="toast-content">
    <span class="icon">{{ isError ? "⚠️" : "✅" }}</span>
    <span class="message">{{ popupMessage }}</span>
  </div>
</div>
