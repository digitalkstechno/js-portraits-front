    <!-- Master Dropdown -->
    <div class="menu-item dropdown">
      <span (click)="toggleMaster()">Master ▾</span>

      <div class="dropdown-menu" *ngIf="isMasterOpen">

        <p routerLink="/package-master" routerLinkActive="active" (click)="closeMaster()">Package Master</p>
      </div>
    </div>

    <span>Transaction</span>
    <span>Officer</span>
    <span>New Purchase</span>
    <span>Discount</span>
    <span>Booking Form</span>
    <span>SMS</span>
    <span>Utility</span>
    <span>Facebook</span>
    <span>Report</span>
    <span>Cheque</span>
    <span>Sheet</span>
    <span>Log Off</span>

  </div>
