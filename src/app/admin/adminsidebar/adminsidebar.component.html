<div class="sidebar-container" [class.collapsed]="collapsed">
  <button class="toggle-btn" (click)="toggleSidebar.emit()">
    <span class="icon">☰</span>
  </button>

  <nav class="nav-list">
    <button
      class="menu-btn"
      routerLink="/admin/accounts"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <span class="btn-text">ACCOUNT MASTER</span>
    </button>

    <button
      class="menu-btn"
      routerLink="/admin/quotation"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          ></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
      </span>
      <span class="btn-text">QUOTATION</span>
    </button>

    <button
      class="menu-btn"
      routerLink="/admin/outdoor-order"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
          ></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
        </svg>
      </span>
      <span class="btn-text">ORDER FORM</span>
    </button>

    <button
      class="menu-btn"
      routerLink="/admin/outdoor-bill"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </span>
      <span class="btn-text">OUTDOOR BILL</span>
    </button>

    <button
      class="menu-btn"
      routerLink="/admin/staff"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </span>
      <span class="btn-text">Staff Entry</span>
    </button>

    <button
      class="menu-btn"
      routerLink="/admin/staff/salary"
      routerLinkActive="active"
    >
      <span class="btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="2" y="4" width="20" height="16" rx="2"></rect>
          <path d="M7 15h0M2 9.5h20"></path>
        </svg>
      </span>
      <span class="btn-text">Staff Salary</span>
    </button>
  </nav>
</div>
